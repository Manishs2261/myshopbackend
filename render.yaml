services:
  - type: web
    name: localshop-api
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      # ── Secrets: set these manually in Render dashboard ────────────────────
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false

      # ── Non-sensitive: committed values ────────────────────────────────────
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DEBUG
        value: "false"
      - key: APP_NAME
        value: LocalShop

      - key: SUPABASE_URL
        value: https://zqqzgkykjyxeqfhenmrf.supabase.co
      - key: SUPABASE_STORAGE_BUCKET
        value: product_image

      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"

      - key: FIREBASE_CREDENTIALS_PATH
        value: /etc/secrets/firebase-credentials.json

      - key: MAIL_FROM
        value: app.appixo@gmail.com
      - key: MAIL_FROM_NAME
        value: LocalShop
      - key: MAIL_SERVER
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_STARTTLS
        value: "true"
      - key: MAIL_SSL_TLS
        value: "false"
      - key: USE_CREDENTIALS
        value: "true"
      - key: VALIDATE_CERTS
        value: "true"

      - key: ALLOWED_ORIGINS
        value: "https://myshop-page-blond.vercel.app,https://vendor-panel-psi.vercel.app,https://myshopadmin-panel.vercel.app,http://localhost:3000,http://localhost:5173,http://localhost:8080"
