<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Storefront</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style id="dynamic-theme">
:root{--primary:#c8a96e;--secondary:#1a1208;--bg:#faf8f5;--surface:#ffffff;--text:#1a1208;--text-secondary:#6b5c45;--border:#ede8df;--accent-light:#f0ebe2}
</style>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px}
.topbar{background:var(--secondary);color:rgba(255,255,255,0.85);padding:8px 24px;display:flex;justify-content:space-between;align-items:center;font-size:11px;letter-spacing:0.08em}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:12px}
.logo-img{width:44px;height:44px;border-radius:10px;background:var(--accent-light);display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden}
.logo-img img{width:100%;height:100%;object-fit:cover}
.logo-text{display:flex;flex-direction:column}
.logo-name{font-family:'Playfair Display',serif;font-size:20px;color:var(--text)}
.logo-sub{font-size:10px;color:var(--primary);letter-spacing:0.18em;text-transform:uppercase}
.header-actions{display:flex;align-items:center;gap:14px}
.icon-btn{width:36px;height:36px;border-radius:50%;background:var(--accent-light);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center}

.banner{position:relative;height:280px;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;overflow:hidden}
.banner-bg{position:absolute;inset:0;z-index:0;background:linear-gradient(135deg,var(--secondary),#3d2e18)}
.banner-bg img{width:100%;height:100%;object-fit:cover}
.banner-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.45);z-index:1}
.banner-content{position:relative;z-index:2;max-width:600px}
.banner-tag{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--primary);font-weight:500;margin-bottom:10px}
.banner-title{font-family:'Playfair Display',serif;font-size:32px;color:white;line-height:1.2;margin-bottom:10px}
.banner-sub{font-size:13px;color:rgba(255,255,255,0.75);line-height:1.5}

main{max-width:1200px;margin:0 auto;padding:32px 24px}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.section-title{font-family:'Playfair Display',serif;font-size:22px;color:var(--text)}

.vendor-info-bar{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px 24px;margin-bottom:32px;display:flex;gap:24px;flex-wrap:wrap;align-items:center}
.info-item{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-secondary)}
.info-item svg{width:16px;height:16px;color:var(--primary)}

.product-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:40px}
.product-card{background:var(--surface);border-radius:14px;overflow:hidden;border:1px solid var(--border);transition:all 0.22s;cursor:pointer}
.product-card:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(0,0,0,0.08)}
.product-img{height:180px;display:flex;align-items:center;justify-content:center;background:var(--accent-light);position:relative;overflow:hidden}
.product-img img{width:100%;height:100%;object-fit:cover}
.discount-badge{position:absolute;top:10px;right:10px;background:linear-gradient(135deg,#ef4444,#f97316);color:white;font-size:10px;padding:4px 10px;border-radius:8px;font-weight:700}
.stock-badge{position:absolute;bottom:10px;left:10px;background:rgba(0,0,0,0.6);color:white;font-size:10px;padding:3px 8px;border-radius:6px}
.product-info{padding:14px}
.product-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;line-height:1.35;min-height:2.4em;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.product-category{font-size:11px;color:var(--primary);font-weight:600;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:8px}
.product-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.price-current{font-size:15px;font-weight:800;color:var(--text)}
.price-old{font-size:12px;color:var(--text-secondary);text-decoration:line-through;margin-left:4px}
.add-btn{background:var(--secondary);color:white;border:none;padding:7px 14px;border-radius:8px;font-size:11px;font-weight:500;cursor:pointer;transition:background 0.2s}
.add-btn:hover{background:var(--primary)}

.loading{text-align:center;padding:60px 20px;color:var(--text-secondary)}
.loading-spinner{width:40px;height:40px;border:3px solid var(--accent-light);border-top-color:var(--primary);border-radius:50%;margin:0 auto 20px;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error{text-align:center;padding:60px 20px;color:#dc3545}

footer{background:var(--secondary);color:rgba(255,255,255,0.6);padding:32px 24px;text-align:center;font-size:12px}
.socials{display:flex;justify-content:center;gap:12px;margin-top:12px}
.socials a{color:rgba(255,255,255,0.7);text-decoration:none;font-size:13px;padding:6px 14px;border:1px solid rgba(255,255,255,0.2);border-radius:20px;transition:all 0.2s}
.socials a:hover{color:white;border-color:var(--primary)}

@media(max-width:1024px){.product-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:768px){.product-grid{grid-template-columns:repeat(2,1fr)}.banner-title{font-size:24px}.banner{height:220px}}
@media(max-width:480px){.product-grid{grid-template-columns:repeat(2,1fr);gap:10px}.product-info{padding:10px}.banner-title{font-size:20px}}
</style>
</head>
<body>

<div class="topbar">
  <span id="topbar-left">Welcome to our store</span>
  <span id="topbar-right">Support local businesses</span>
</div>

<header>
  <div class="logo">
    <div class="logo-img" id="store-logo">&#127970;</div>
    <div class="logo-text">
      <span class="logo-name" id="store-name">Store</span>
      <span class="logo-sub" id="store-tagline">Local Vendor</span>
    </div>
  <div class="header-actions">
    <button class="icon-btn" title="Cart" onclick="alert('Cart coming soon')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text)" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
    </button>
  </div>
</header>

<div class="banner" id="banner-section">
  <div class="banner-bg" id="banner-bg"></div>
  <div class="banner-overlay"></div>
  <div class="banner-content">
    <div class="banner-tag" id="banner-tag">Welcome</div>
    <h1 class="banner-title" id="banner-title">Our Store</h1>
    <p class="banner-sub" id="banner-sub">Discover amazing products</p>
  </div>

<main>
  <div class="vendor-info-bar" id="vendor-info-bar" style="display:none" data-has-info="false">
    <div class="info-item" id="info-address" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
      <span id="val-address"></span>
    </div>
    <div class="info-item" id="info-phone" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      <span id="val-phone"></span>
    </div>
    <div class="info-item" id="info-email" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
      <span id="val-email"></span>
    </div>

  <div class="section-header">
    <h2 class="section-title">Products</h2>
  </div>

  <div id="loading-state" class="loading">
    <div class="loading-spinner"></div>
    <p>Loading products...</p>
  </div>

  <div id="error-state" class="error" style="display:none;">
    <div style="font-size:48px;margin-bottom:16px">&#9888;&#65039;</div>
    <h3>Oops! Something went wrong</h3>
    <p>We couldn't load the store. Please try again later.</p>
  </div>

  <div id="products-grid" class="product-grid" style="display:none;"></div>
</main>

<footer>
  <div id="footer-brand" style="font-family:'Playfair Display',serif;color:var(--primary);font-size:20px;margin-bottom:8px">LocalShop</div>
  <p id="footer-text">Connecting communities through local commerce</p>
  <div class="socials" id="socials" style="display:none"></div>
</footer>

<script>
const API_BASE = window.location.origin.includes(':3000') ? 'http://localhost:8000' : '';
const urlParams = new URLSearchParams(window.location.search);
const vendorId = urlParams.get('vendor_id') || urlParams.get('id');

if(!vendorId){
  document.body.innerHTML = '<div style="text-align:center;padding:100px 20px"><h2>Vendor ID Required</h2><p>Please provide ?vendor_id= in the URL.</p></div>';
}

async function fetchJson(url){
  const res = await fetch(url);
  if(!res.ok) throw new Error('HTTP '+res.status);
  return res.json();
}

function applySettings(s){
  const style = document.getElementById('dynamic-theme');
  const primary = s.primary_color || '#c8a96e';
  const secondary = s.secondary_color || '#1a1208';
  const bg = s.background_color || '#faf8f5';
  style.textContent = ':root{--primary:'+primary+';--secondary:'+secondary+';--bg:'+bg+';--surface:#ffffff;--text:'+secondary+';--text-secondary:#6b5c45;--border:#ede8df;--accent-light:#f0ebe2}';
  let custom = document.getElementById('custom-css');
  if(!custom){ custom = document.createElement('style'); custom.id='custom-css'; document.head.appendChild(custom); }
  custom.textContent = s.custom_css || '';
  if(s.show_banner !== false){
    document.getElementById('banner-section').style.display = 'flex';
    document.getElementById('banner-tag').textContent = s.banner_text || 'Welcome';
    document.getElementById('banner-title').textContent = s.banner_text || 'Our Store';
    document.getElementById('banner-sub').textContent = s.banner_subtext || 'Discover amazing products';
  } else {
    document.getElementById('banner-section').style.display = 'none';
  }
  const socials = [];
  if(s.facebook_url) socials.push('<a href="'+s.facebook_url+'" target="_blank">Facebook</a>');
  if(s.instagram_url) socials.push('<a href="'+s.instagram_url+'" target="_blank">Instagram</a>');
  if(s.twitter_url) socials.push('<a href="'+s.twitter_url+'" target="_blank">Twitter</a>');
  if(s.whatsapp_number) socials.push('<a href="https://wa.me/'+s.whatsapp_number+'" target="_blank">WhatsApp</a>');
  if(socials.length){
    document.getElementById('socials').innerHTML = socials.join('');
    document.getElementById('socials').style.display = 'flex';
  } else {
    document.getElementById('socials').style.display = 'none';
  }
  if(s.meta_title) document.title = s.meta_title;
  const infoBar = document.getElementById('vendor-info-bar');
  if(s.show_vendor_info === false){
    infoBar.style.display = 'none';
  } else if(infoBar.dataset.hasInfo === 'true'){
    infoBar.style.display = 'flex';
  }
}

window.addEventListener('message', function(event){
  if(event.data && event.data.type === 'preview-settings'){
    applySettings(event.data.settings);
  }
});

function applyVendor(data){
  const v = data.vendor;
  const shop = data.shop;
  document.getElementById('store-name').textContent = shop.name || v.business_name;
  document.getElementById('store-tagline').textContent = shop.description || 'Local Vendor';
  document.getElementById('footer-brand').textContent = shop.name || v.business_name;
  if(shop.logo_url){
    document.getElementById('store-logo').innerHTML = '<img src="'+shop.logo_url+'" alt="">';
  }
  if(shop.banner_url){
    document.getElementById('banner-bg').innerHTML = '<img src="'+shop.banner_url+'" alt="">';
  }
  const infoBar = document.getElementById('vendor-info-bar');
  let hasInfo = false;
  if(shop.address){
    document.getElementById('val-address').textContent = [shop.address, shop.city, shop.state].filter(Boolean).join(', ');
    document.getElementById('info-address').style.display='flex';
    hasInfo = true;
  }
  if(shop.contact_phone || v.business_phone){
    document.getElementById('val-phone').textContent = shop.contact_phone || v.business_phone;
    document.getElementById('info-phone').style.display='flex';
    hasInfo = true;
  }
  if(shop.contact_email || v.business_email){
    document.getElementById('val-email').textContent = shop.contact_email || v.business_email;
    document.getElementById('info-email').style.display='flex';
    hasInfo = true;
  }
  if(hasInfo){
    infoBar.dataset.hasInfo = 'true';
    infoBar.style.display = 'flex';
  }
}

function createProductCard(p){
  const hasDiscount = p.discount_percentage && p.discount_percentage > 0;
  const price = hasDiscount ? p.discounted_price : p.price;
  const priceStr = typeof price === 'number' ? price.toFixed(2) : price;
  const oldPriceStr = typeof p.price === 'number' ? p.price.toFixed(2) : p.price;
  return '<div class="product-card" onclick="alert(\'Product details coming soon: '+p.name.replace(/'/g,"\\'")+'\')">'+
    '<div class="product-img">'+
      (p.images && p.images[0] ? '<img src="'+p.images[0]+'" alt="'+p.name+'">' : '<span style="font-size:32px">&#128230;</span>')+
      (hasDiscount ? '<div class="discount-badge">-'+p.discount_percentage+'%</div>' : '')+
      (p.stock !== undefined && p.stock <= 5 ? '<div class="stock-badge">'+(p.stock === 0 ? 'Out of Stock' : p.stock+' left')+'</div>' : '')+
    '</div>'+
    '<div class="product-info">'+
      '<div class="product-category">'+(p.category_name || 'Product')+'</div>'+
      '<div class="product-name">'+p.name+'</div>'+
      '<div class="product-bottom">'+
        '<div class="price-wrap">'+
          '<span class="price-current">&#8377;'+priceStr+'</span>'+
          (hasDiscount ? '<span class="price-old">&#8377;'+oldPriceStr+'</span>' : '')+
        '</div>'+
        '<button class="add-btn"'+(p.stock === 0 ? ' disabled style="opacity:0.5"' : '')+'>Add</button>'+
      '</div>'+
    '</div>'+
  '</div>';
}

async function loadStore(){
  try{
    const [settings, profile] = await Promise.all([
      fetchJson(API_BASE+'/public/vendor/'+vendorId+'/marketplace-settings'),
      fetchJson(API_BASE+'/public/vendor/'+vendorId)
    ]);
    applySettings(settings);
    applyVendor(profile);
    const grid = document.getElementById('products-grid');
    grid.innerHTML = '';
    const products = profile.products || [];
    if(products.length === 0){
      grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text-secondary)"><div style="font-size:48px;margin-bottom:16px">&#128230;</div><h3 style="margin-bottom:8px;color:var(--text)">No products yet</h3><p>Check back later for new arrivals!</p></div>';
    } else {
      products.forEach(p => grid.innerHTML += createProductCard(p));
    }
    document.getElementById('loading-state').style.display = 'none';
    grid.style.display = 'grid';
  }catch(err){
    console.error(err);
    document.getElementById('loading-state').style.display = 'none';
    document.getElementById('error-state').style.display = 'block';
  }
}

document.addEventListener('DOMContentLoaded', loadStore);
</script>
</body>
</html>
